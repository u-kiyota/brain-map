# 重要度（サリエンス）メタ
# AI の知識ベース本体ではない管理ファイル。出力カテゴリファイルにはスコア・回数を書かず、重みは節構造と並び順で表す。
# 本ファイルは頻度・情報源・最終観測を保持し、更新時の昇格／降格判断に使う。

meta:
  updated_at: 2026-05-31
  method: reorganize  # 新規フェッチなし。tier は本文の強調・反復・複数情報源での出現から推定
  signals: [recurrence, intensity, consistency]  # 頻度・強度・一貫性
  tiers: [core, supporting, peripheral]
  note: >
    今回は初の重要度再格付け。既存カテゴリ（11ファイル）を「コア」節→「補助的なパターン」節に再構成し、
    周辺観察を _archive.md へ退避した。recurrence/intensity/consistency は high/medium/low の定性値で記録。
    厳密な出現回数は未フェッチのため未確定（次回更新時にソース横断で加算していく）。

